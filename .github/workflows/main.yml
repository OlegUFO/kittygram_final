name: Kittygram workflow

on:
  push:
    branches:
      - main
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r backend/requirements.txt

      - name: Lint
        run: flake8 backend/

      - name: Run tests
        run: |
          pytest

  build_and_push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest ./backend
      - name: Push backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest ./frontend
      - name: Push frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - name: Build gateway
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest ./nginx
      - name: Push gateway
        run: docker push ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd kittygram
            sudo docker compose pull
            sudo docker compose down
            sudo docker compose up -d
            sudo docker compose exec -T backend python manage.py migrate 
            sudo docker compose exec -T backend python manage.py collectstatic --noinput

      - name: Send message Telegram
        run: |
          curl -s https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="Деплой Kittygram выполнен!"


